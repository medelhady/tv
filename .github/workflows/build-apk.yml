name: Build TOD TV APK

on:
  push:
    branches: [ main ]
    paths-ignore:
      - "tod-tv-launcher.apk"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Install Gradle
        run: |
          wget https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip gradle-8.7-bin.zip
          echo "$PWD/gradle-8.7/bin" >> $GITHUB_PATH

      - name: Show project files
        run: |
          find android-app -maxdepth 6 -type f | sort

      - name: Build APK
        working-directory: android-app
        run: |
          set -o pipefail
          gradle --stacktrace assembleDebug 2>&1 | tee ../build-log.txt

      - name: Find and copy APK to site root
        run: |
          find android-app -name "*.apk" -type f
          APK_PATH=$(find android-app -name "*.apk" -type f | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK file was created"
            exit 1
          fi
          cp "$APK_PATH" tod-tv-launcher.apk

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-log.txt

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tod-tv-launcher-apk
          path: tod-tv-launcher.apk

      - name: Commit APK
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add tod-tv-launcher.apk
          git commit -m "Build TOD TV launcher APK" || echo "No changes"
          git push
