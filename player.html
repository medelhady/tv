<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Rem TV - Pure Player</title>
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            overflow: hidden;
        }
        /* مشغل صافي ومباشر يأخذ كامل حجم الشاشة إجبارياً */
        #tv-iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #000;
        }
    </style>
</head>
<body>

    <div id="player-container" style="width:100%; height:100%;"></div>

    <script>
        // 1. قراءة معرف الفيديو من الرابط المحول تلقائياً
        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('id');
        const container = document.getElementById('player-container');

        if (videoId) {
            // 2. بناء التضمين بأبسط صيغة مدعومة عالمياً في شاشات أندرويد
            container.innerHTML = `
                <iframe 
                    id="tv-iframe"
                    src="https://www.youtube.com/embed/${videoId}?autoplay=1&controls=1&rel=0&vq=hd720" 
                    allow="autoplay; encrypted-media" 
                    allowfullscreen>
                </iframe>`;
        } else {
            // إذا فتحت الصفحة بالخطأ، عد للرئيسية
            window.location.href = 'index.html';
        }

        // 3. التقاط زر الرجوع بالريموت (Back) لإرجاع المستخدم للواجهة الرئيسية
        window.addEventListener('keydown', function(e) {
            // الأكواد الشهيرة لزر الرجوع في ريموت التلفزيون (4 أو 8 أو 27)
            if (e.key === 'Escape' || e.keyCode === 27 || e.keyCode === 8 || e.keyCode === 4) {
                e.preventDefault();
                window.location.href = 'index.html'; // العودة للرئيسية وتدمير المشغل
            }
        });
    </script>
</body>
</html>
