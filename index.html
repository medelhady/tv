<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Rem - TV Hub</title>
    <style>
        /* ضبط الأبعاد الثابتة للشاشة الصينية 1280x720 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #111;
            color: #fff;
            width: 1280px;
            height: 720px;
            overflow: hidden; /* منع التمرير العشوائي */
            padding: 40px;
        }

        /* الهيدر العلوي */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            height: 50px;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #00ff66; /* الهوية البصرية لـ ريم */
            text-transform: uppercase;
        }

        .time {
            font-size: 20px;
            color: #aaa;
        }

        /* القوائم الأفقية */
        .row-title {
            font-size: 22px;
            margin-bottom: 15px;
            color: #eee;
            font-weight: 600;
        }

        .horizontal-grid {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 15px;
            margin-bottom: 30px;
            scroll-behavior: smooth;
        }

        /* إخفاء شريط التمرير الافتراضي */
        .horizontal-grid::-webkit-scrollbar {
            display: none;
        }

        /* كروت الأفلام والقنوات */
        .card {
            min-width: 220px;
            max-width: 220px;
            height: 130px;
            background: #222;
            border-radius: 8px;
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* حالة التركيز (Focus) عند التنقل بالريموت */
        .card:focus, .card.active {
            border-color: #00ff66;
            transform: scale(1.05);
            background: #2a2a2a;
            outline: none;
        }

        .card-title {
            font-size: 16px;
            font-weight: bold;
        }

        .card-meta {
            font-size: 12px;
            color: #00ff66;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <!-- الهيدر -->
    <header>
        <div class="logo">Smart Rem TV 📺</div>
        <div class="time" id="clock">00:00</div>
    </header>

    <!-- القسم الأول: البث المباشر -->
    <div class="row-title">البث المباشر (Live TV)</div>
    <div class="horizontal-grid">
        <div class="card" tabindex="1">
            <div class="card-title">قناة beIN SPORTS 1</div>
            <div class="card-meta">جودة HD | Widevine OK</div>
        </div>
        <div class="card" tabindex="2">
            <div class="card-title">قناة SSC 1</div>
            <div class="card-meta">مباشر الآن</div>
        </div>
        <div class="card" tabindex="3">
            <div class="card-title">قناة شاهد الأولى</div>
            <div class="card-meta">منوعات</div>
        </div>
        <div class="card" tabindex="4">
            <div class="card-title">قناة أبوظبي الرياضية</div>
            <div class="card-meta">بث مباشر</div>
        </div>
    </div>

    <!-- القسم الثاني: الأفلام والمسلسلات -->
    <div class="row-title">المضاف حديثاً (TOD & Shahid)</div>
    <div class="horizontal-grid">
        <div class="card" tabindex="5">
            <div class="card-title">فيلم الإثارة والأكشن</div>
            <div class="card-meta">شاهد حصرياً</div>
        </div>
        <div class="card" tabindex="6">
            <div class="card-title">مسلسل دراما رمضان</div>
            <div class="card-meta">الحلقة 5</div>
        </div>
        <div class="card" tabindex="7">
            <div class="card-title">وثائقي المباريات</div>
            <div class="card-meta">إنتاج TOD</div>
        </div>
    </div>

    <script>
        // تحديث الساعة التلقائي في الهيدر
        function updateClock() {
            const now = new Date();
            let hours = now.getHours().toString().padStart(2, '0');
            let minutes = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('clock').innerText = hours + ':' + minutes;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // تفعيل التنقل التلقائي لأول كارت عند فتح الصفحة
        document.querySelector('.card').focus();
    </script>
</body>
</html>
