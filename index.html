<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>TOD TV Debug Launcher</title>
  <style>
    body {
      margin: 0;
      background: #101418;
      color: white;
      font-family: Arial, sans-serif;
      font-size: 28px;
      padding: 26px;
    }
    h1 { font-size: 40px; }
    button {
      display: block;
      width: 100%;
      margin: 16px 0;
      padding: 24px;
      font-size: 30px;
      background: #08a8f8;
      color: white;
      border: 2px solid white;
    }
    button:focus {
      outline: 7px solid #ffcc00;
    }
    .dark { background: #26313c; }
    .box {
      background: #202833;
      padding: 20px;
      margin-top: 20px;
      white-space: pre-wrap;
      direction: ltr;
      text-align: left;
      font-size: 22px;
    }
  </style>
</head>
<body>
  <h1>TOD Debug Launcher</h1>

  <button onclick="openClean('https://www.tod.tv/')">1 - Open TOD Clean</button>
  <button onclick="openClean('https://www.tod.tv/ar')">2 - Open TOD Arabic Clean</button>
  <button onclick="openClean('https://www.tod.tv/en')">3 - Open TOD English Clean</button>
  <button onclick="openPlain('https://www.tod.tv/ar')">4 - Open Without Cache Buster</button>
  <button class="dark" onclick="showInfo()">5 - Browser Info</button>

  <div id="log" class="box">Ready</div>

  <script>
    var log = document.getElementById('log');

    function openClean(url) {
      var finalUrl = url;
      var sep = finalUrl.indexOf('?') === -1 ? '?' : '&';
      finalUrl = finalUrl + sep + 'tv=' + new Date().getTime();

      log.innerHTML = 'Opening clean URL:\n' + finalUrl + '\n\nIf it keeps spinning, clear TV browser cookies/cache.';
      setTimeout(function () {
        window.location.href = finalUrl;
      }, 600);
    }

    function openPlain(url) {
      log.innerHTML = 'Opening:\n' + url;
      setTimeout(function () {
        window.location.href = url;
      }, 600);
    }

    function showInfo() {
      var out = '';
      out += 'User Agent:\n' + navigator.userAgent + '\n\n';
      out += 'Cookies: ' + (navigator.cookieEnabled ? 'YES' : 'NO') + '\n';
      out += 'LocalStorage: ';
      try {
        localStorage.setItem('x', '1');
        localStorage.removeItem('x');
        out += 'YES\n';
      } catch(e) {
        out += 'NO\n';
      }
      out += 'MediaSource: ' + (window.MediaSource ? 'YES' : 'NO') + '\n';
      out += 'EME: ' + (navigator.requestMediaKeySystemAccess ? 'YES' : 'NO') + '\n';
      log.innerHTML = out;
    }

    document.onkeydown = function(event) {
      event = event || window.event;
      var code = event.keyCode || event.which;
      var items = document.querySelectorAll('button');
      var active = document.activeElement;
      var index = 0;

      for (var i = 0; i < items.length; i++) {
        if (items[i] === active) index = i;
      }

      if (code === 38 || code === 37) {
        index--;
        if (index < 0) index = items.length - 1;
        items[index].focus();
        return false;
      }

      if (code === 40 || code === 39) {
        index++;
        if (index >= items.length) index = 0;
        items[index].focus();
        return false;
      }

      if (code === 13 && active && active.click) {
        active.click();
        return false;
      }

      return true;
    };

    window.onload = function() {
      document.querySelector('button').focus();
      showInfo();
    };
  </script>
</body>
</html>
