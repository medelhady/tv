<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Rem - TV Hub</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #111;
            color: #fff;
            width: 100vw; /* يأخذ كامل عرض المتصفح المتاح تلقائياً */
            height: 100vh; /* يأخذ كامل الارتفاع المتاح تلقائياً */
            overflow: hidden; 
            padding: 3vw; /* مسافات أمان مرنة لحواف الشاشة */
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 10%;
            margin-bottom: 2vh;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            color: #00ff66;
        }

        .time {
            font-size: 1.3rem;
            color: #aaa;
        }

        .row-title {
            font-size: 1.4rem;
            margin-bottom: 1vh;
            color: #eee;
            font-weight: 600;
        }

        .horizontal-grid {
            display: flex;
            gap: 1.5vw;
            overflow-x: auto;
            height: 35%; /* توزيع متساوي للأقسام */
            align-items: center;
        }

        .horizontal-grid::-webkit-scrollbar {
            display: none;
        }

        .card {
            flex: 0 0 22%; /* يجعل الكروت تتناسق عرضياً حسب حجم الشاشة */
            height: 85%;
            background: #222;
            border-radius: 8px;
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .card:focus, .card.active {
            border-color: #00ff66;
            transform: scale(1.03);
            background: #2a2a2a;
            outline: none;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-meta {
            font-size: 0.8rem;
            color: #00ff66;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Smart Rem TV 📺</div>
        <div class="time" id="clock">00:00</div>
    </header>

    <div class="row-title">البث المباشر (Live TV)</div>
    <div class="horizontal-grid">
        <div class="card" tabindex="1">
            <div class="card-title">قناة beIN SPORTS 1</div>
            <div class="card-meta">جودة HD | DRM OK</div>
        </div>
        <div class="card" tabindex="2">
            <div class="card-title">قناة SSC 1</div>
            <div class="card-meta">مباشر الآن</div>
        </div>
        <div class="card" tabindex="3">
            <div class="card-title">قناة شاهد الأولى</div>
            <div class="card-meta">منوعات</div>
        </div>
        <div class="card" tabindex="4">
            <div class="card-title">قناة أبوظبي الرياضية</div>
            <div class="card-meta">بث مباشر</div>
        </div>
    </div>

    <div class="row-title">المضاف حديثاً (TOD & Shahid)</div>
    <div class="horizontal-grid">
        <div class="card" tabindex="5">
            <div class="card-title">فيلم الإثارة والأكشن</div>
            <div class="card-meta">شاهد حصرياً</div>
        </div>
        <div class="card" tabindex="6">
            <div class="card-title">مسلسل دراما رمضان</div>
            <div class="card-meta">الحلقة 5</div>
        </div>
        <div class="card" tabindex="7">
            <div class="card-title">وثائقي المباريات</div>
            <div class="card-meta">إنتاج TOD</div>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = 
                now.getHours().toString().padStart(2, '0') + ':' + 
                now.getMinutes().toString().padStart(2, '0');
        }
        setInterval(updateClock, 1000);
        updateClock();

        // فوكس تلقائي
        document.querySelector('.card').focus();
    </script>
</body>
</html>
