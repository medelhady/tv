<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>TV Browser Test</title>
  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      font-size: 28px;
      padding: 30px;
    }
    a, button {
      display: block;
      width: 100%;
      box-sizing: border-box;
      margin: 20px 0;
      padding: 25px;
      font-size: 30px;
      background: #1565c0;
      color: white;
      border: 0;
      text-align: center;
      text-decoration: none;
    }
    .box {
      background: #222;
      padding: 20px;
      margin-top: 20px;
      white-space: pre-wrap;
      direction: ltr;
      text-align: left;
    }
  </style>
</head>
<body>
  <h1>TV Browser Test</h1>

  <a href="https://www.tod.tv/">Open TOD</a>
  <a href="https://connect.bein.com/">Open beIN CONNECT</a>

  <button onclick="runTest()">Test Browser Support</button>

  <div id="result" class="box">Press test button</div>

  <script>
    function runTest() {
      var out = '';

      out += 'User Agent:\n' + navigator.userAgent + '\n\n';
      out += 'Cookies: ' + (navigator.cookieEnabled ? 'YES' : 'NO') + '\n';

      out += 'Local Storage: ';
      try {
        localStorage.setItem('x', '1');
        localStorage.removeItem('x');
        out += 'YES\n';
      } catch (e) {
        out += 'NO\n';
      }

      out += 'Promise: ' + (window.Promise ? 'YES' : 'NO') + '\n';
      out += 'Fetch: ' + (window.fetch ? 'YES' : 'NO') + '\n';
      out += 'MediaSource: ' + (window.MediaSource ? 'YES' : 'NO') + '\n';
      out += 'EME DRM: ' + (navigator.requestMediaKeySystemAccess ? 'YES' : 'NO') + '\n';

      document.getElementById('result').innerHTML = out;
    }
  </script>
</body>
</html>
