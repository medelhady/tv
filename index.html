<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Rem - Live TV Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #1a1f1c 0%, #0d0f0e 100%);
            color: #fff;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            padding: 3.5vw;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 12%;
            margin-bottom: 3vh;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 15px;
        }

        .logo {
            font-size: 2rem;
            font-weight: 900;
            color: #00ff66;
            text-shadow: 0 0 15px rgba(0, 255, 102, 0.3);
        }

        .time {
            font-size: 1.4rem;
            color: #888;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.03);
            padding: 5px 15px;
            border-radius: 20px;
        }

        .row-title {
            font-size: 1.3rem;
            margin-bottom: 1.5vh;
            color: #fff;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .row-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 18px;
            background: #00ff66;
            border-radius: 2px;
        }

        .horizontal-grid {
            display: flex;
            gap: 2vw;
            overflow-x: auto;
            height: 33%;
            align-items: center;
            padding: 10px 5px;
        }

        .horizontal-grid::-webkit-scrollbar {
            display: none;
        }

        .card {
            flex: 0 0 21%;
            height: 95%;
            background: linear-gradient(135deg, rgba(40,40,40,0.7) 0%, rgba(20,20,20,0.8) 100%);
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            cursor: pointer;
            position: relative;
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.25s;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        .card:focus {
            border-color: #00ff66;
            transform: scale(1.06);
            background: linear-gradient(135deg, #223c2b 0%, #111e15 100%);
            box-shadow: 0 0 25px rgba(0, 255, 102, 0.4);
            outline: none;
        }

        .card-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: #fff;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-meta {
            font-size: 0.8rem;
            color: #00ff66;
            background: rgba(0, 255, 102, 0.1);
            padding: 2px 8px;
            border-radius: 6px;
        }

        /* 📺 طبقة مشغل الفيديو (Fullscreen Player Overlay) */
        #video-player-container {
            display: none; /* مخفي افتراضياً */
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            z-index: 9999;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* تلميح لكيفية الخروج */
        .player-hint {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #ccc;
            pointer-events: none;
            z-index: 10000;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">🎛️ SMART REM TV</div>
        <div class="time" id="clock">00:00</div>
    </header>

    <div class="row-title">البث المباشر وقنوات التجربة</div>
    <div class="horizontal-grid">
        <div class="card" tabindex="1" data-stream="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4">
            <div class="card-title">قناة البث التجريبية 1</div>
            <div class="card-footer">
                <div class="card-meta">اضغط للتجربة</div>
            </div>
        </div>
        <div class="card" tabindex="2" data-stream="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4">
            <div class="card-title">قناة البث التجريبية 2</div>
            <div class="card-footer">
                <div class="card-meta">عرض سينمائي</div>
            </div>
        </div>
    </div>

    <div id="video-player-container">
        <div class="player-hint">اضغط زر الحجوع (Back) بالريموت للعودة للقائمة</div>
        <video id="tv-video-player" controls></video>
    </div>

    <script>
        // تحديث الساعة
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = 
                now.getHours().toString().padStart(2, '0') + ':' + 
                now.getMinutes().toString().padStart(2, '0');
        }
        setInterval(updateClock, 1000);
        updateClock();

        // التركيز التلقائي عند الفتح
        const firstCard = document.querySelector('.card');
        if(firstCard) firstCard.focus();

        const playerContainer = document.getElementById('video-player-container');
        const videoPlayer = document.getElementById('tv-video-player');

        // دالة تشغيل الفيديو عند اختيار كارت
        function playStream(url) {
            videoPlayer.src = url;
            playerContainer.style.display = 'block';
            videoPlayer.play();
        }

        // دالة إغلاق الفيديو والعودة
        function closePlayer() {
            videoPlayer.pause();
            videoPlayer.src = '';
            playerContainer.style.display = 'none';
            // إعادة الفوكس لأول كارت لضمان استمرار التحكم بالريموت
            document.querySelector('.card').focus();
        }

        // الاستماع لضغطات الريموت كونترول واللوحة
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('click', function() {
                const streamUrl = this.getAttribute('data-stream');
                if(streamUrl) playStream(streamUrl);
            });

            card.addEventListener('keydown', function(e) {
                // زر OK في الريموت أو Enter في الكيبورد (KeyCode 13)
                if (e.key === 'Enter' || e.keyCode === 13) {
                    const streamUrl = this.getAttribute('data-stream');
                    if(streamUrl) playStream(streamUrl);
                }
            });
        });

        // التقاط زر الرجوع بالريموت لإغلاق الفيديو
        window.addEventListener('keydown', function(e) {
            // زر Backspace أو Escape أو زر الرجوع الخاص بأندرويد تي في (عادة keyCode 27 أو 4 أو 8)
            if (e.key === 'Escape' || e.keyCode === 27 || e.keyCode === 8) {
                if (playerContainer.style.display === 'block') {
                    e.preventDefault(); // منع المتصفح من الخروج تماماً من الصفحة
                    closePlayer();
                }
            }
        });
    </script>
</body>
</html>
