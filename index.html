<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>TOD TV Launcher</title>
  <style>
    body {
      margin: 0;
      background: #0f141a;
      color: white;
      font-family: Arial, sans-serif;
      font-size: 28px;
      padding: 26px;
    }
    h1 {
      font-size: 42px;
      margin: 0 0 20px;
    }
    .hint {
      background: #202833;
      padding: 20px;
      margin-bottom: 20px;
      font-size: 24px;
      line-height: 1.4;
    }
    button, a {
      display: block;
      width: 100%;
      box-sizing: border-box;
      margin: 16px 0;
      padding: 24px;
      background: #08a8f8;
      color: white;
      border: 2px solid white;
      font-size: 30px;
      text-align: center;
      text-decoration: none;
    }
    button:focus, a:focus {
      outline: 7px solid #ffcc00;
      background: #16b6ff;
    }
    .dark {
      background: #273240;
    }
    .box {
      margin-top: 20px;
      padding: 20px;
      background: #202833;
      white-space: pre-wrap;
      direction: ltr;
      text-align: left;
      font-size: 22px;
    }
  </style>
</head>
<body>
  <h1>TOD TV Launcher</h1>

  <div class="hint">
    جرّب الأزرار بالترتيب. إذا فتح TOD لكن زر الدخول لا يعمل، صوّر الصفحة التي يتوقف عندها.
  </div>

  <button onclick="go('https://www.tod.tv/')">1 - TOD Home</button>
  <button onclick="go('https://www.tod.tv/ar')">2 - TOD Arabic</button>
  <button onclick="go('https://www.tod.tv/en')">3 - TOD English</button>
  <button onclick="go('https://www.tod.tv/ar/sign-in')">4 - TOD Arabic Sign In</button>
  <button onclick="go('https://www.tod.tv/en/sign-in')">5 - TOD English Sign In</button>
  <button onclick="replaceGo('https://www.tod.tv/ar')">6 - TOD Arabic Replace</button>
  <button onclick="assignGo('https://www.tod.tv/ar')">7 - TOD Arabic Assign</button>
  <button class="dark" onclick="showInfo()">8 - Show Browser Info</button>

  <div id="log" class="box">Ready</div>

  <script>
    var log = document.getElementById('log');

    function setLog(text) {
      log.innerHTML = text;
    }

    function go(url) {
      setLog('Opening:\n' + url);
      window.location.href = url;
    }

    function replaceGo(url) {
      setLog('Opening with location.replace:\n' + url);
      window.location.replace(url);
    }

    function assignGo(url) {
      setLog('Opening with location.assign:\n' + url);
      window.location.assign(url);
    }

    function showInfo() {
      var out = '';
      out += 'User Agent:\n' + navigator.userAgent + '\n\n';
      out += 'URL: ' + window.location.href + '\n';
      out += 'Cookies: ' + (navigator.cookieEnabled ? 'YES' : 'NO') + '\n';
      out += 'MediaSource: ' + (window.MediaSource ? 'YES' : 'NO') + '\n';
      out += 'EME: ' + (navigator.requestMediaKeySystemAccess ? 'YES' : 'NO') + '\n';
      setLog(out);
    }

    document.onkeydown = function(event) {
      event = event || window.event;
      var code = event.keyCode || event.which;
      var items = document.querySelectorAll('button, a');
      var active = document.activeElement;
      var index = 0;
      var i;

      for (i = 0; i < items.length; i++) {
        if (items[i] === active) {
          index = i;
        }
      }

      if (code === 38 || code === 37) {
        index = index - 1;
        if (index < 0) index = items.length - 1;
        items[index].focus();
        return false;
      }

      if (code === 40 || code === 39) {
        index = index + 1;
        if (index >= items.length) index = 0;
        items[index].focus();
        return false;
      }

      if (code === 13 && active && active.click) {
        active.click();
        return false;
      }

      return true;
    };

    window.onload = function() {
      var first = document.querySelector('button');
      if (first) first.focus();
      showInfo();
    };
  </script>
</body>
</html>
