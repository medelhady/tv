<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Rem - Total Swap Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: #0d0f0e;
            color: #fff;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* 🎛️ حاوي الواجهة الرئيسية بالكامل */
        #main-hub-ui {
            width: 100%;
            height: 100%;
            padding: 3.5vw;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 12%;
            margin-bottom: 3vh;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 15px;
        }

        .logo {
            font-size: 2rem;
            font-weight: 900;
            color: #00ff66;
            text-shadow: 0 0 15px rgba(0, 255, 102, 0.3);
        }

        .time {
            font-size: 1.4rem;
            color: #888;
        }

        .row-title {
            font-size: 1.3rem;
            margin-bottom: 1.5vh;
            color: #fff;
            font-weight: 700;
        }

        .horizontal-grid {
            display: flex;
            gap: 2vw;
            overflow-x: auto;
            height: 33%;
            align-items: center;
        }

        .horizontal-grid::-webkit-scrollbar {
            display: none;
        }

        .card {
            flex: 0 0 21%;
            height: 95%;
            background: #1a1f1c;
            border-radius: 14px;
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        .card:focus {
            border-color: #00ff66;
            transform: scale(1.05);
            background: #223c2b;
            outline: none;
        }

        .card-title {
            font-size: 1.15rem;
            font-weight: 700;
        }

        /* 📺 حاوي مشغل الفيديو المستقل تماماً (مخفي في البداية) */
        #pure-video-screen {
            display: none; /* مخفي تماماً لمنع تشتيت المعالج */
            width: 100vw;
            height: 100vh;
            background-color: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #000;
        }
    </style>
</head>
<body>

    <div id="main-hub-ui">
        <header>
            <div class="logo">🎛️ SMART REM TV</div>
            <div class="time" id="clock">00:00</div>
        </header>

        <div class="row-title">قنوات فحص معالج الشاشة</div>
        <div class="horizontal-grid">
            <div class="card" tabindex="1" data-youtube="NpEaa2P7qZI">
                <div class="card-title">قناة الطبيعة العالمية</div>
            </div>
            <div class="card" tabindex="2" data-youtube="Ir3Vb_709pM">
                <div class="card-title">إعلان سينمائي تجريبي</div>
            </div>
        </div>
    </div>

    <div id="pure-video-screen"></div>

    <script>
        // تحديث الساعة
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = 
                now.getHours().toString().padStart(2, '0') + ':' + 
                now.getMinutes().toString().padStart(2, '0');
        }
        setInterval(updateClock, 1000);
        updateClock();

        document.querySelector('.card').focus();

        const mainHub = document.getElementById('main-hub-ui');
        const videoScreen = document.getElementById('pure-video-screen');

        // الحيلة: إخفاء الواجهة بالكامل وتخصيص الشاشة للفيديو فقط
        function playVideo(videoId) {
            mainHub.style.display = 'none'; // اختفاء كامل للواجهة
            videoScreen.style.display = 'block'; // ظهور شاشة الفيديو المباشرة
            
            videoScreen.innerHTML = `
                <iframe 
                    src="https://www.youtube.com/embed/${videoId}?autoplay=1&controls=1&rel=0" 
                    allow="autoplay; encrypted-media" 
                    allowfullscreen>
                </iframe>`;
        }

        // إلغاء الفيديو وإعادة إظهار الواجهة
        function closeVideo() {
            videoScreen.innerHTML = ''; // تدمير الـ iframe فوراً
            videoScreen.style.display = 'none';
            mainHub.style.display = 'flex'; // إعادة تفعيل الواجهة
            document.querySelector('.card').focus(); // إعادة التحكم بالريموت
        }

        // تفعيل أزرار الريموت والضغط
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('click', function() {
                const videoId = this.getAttribute('data-youtube');
                if(videoId) playVideo(videoId);
            });

            card.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.keyCode === 13) {
                    const videoId = this.getAttribute('data-youtube');
                    if(videoId) playVideo(videoId);
                }
            });
        });

        // زر الرجوع بالريموت للخروج من الفيديو
        window.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' || e.keyCode === 27 || e.keyCode === 8 || e.keyCode === 4) {
                if (videoScreen.style.display === 'block') {
                    e.preventDefault();
                    closeVideo();
                }
            }
        });
    </script>
</body>
</html>
