<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Rem - TV Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background: #0d0f0e; color: #fff; width: 100vw; height: 100vh; overflow: hidden; padding: 3.5vw; display: flex; flex-direction: column; }
        header { display: flex; justify-content: space-between; align-items: center; height: 12%; margin-bottom: 3vh; border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding-bottom: 15px; }
        .logo { font-size: 2rem; font-weight: 900; color: #00ff66; text-shadow: 0 0 15px rgba(0, 255, 102, 0.3); }
        .time { font-size: 1.4rem; color: #888; }
        .row-title { font-size: 1.3rem; margin-bottom: 1.5vh; color: #fff; font-weight: 700; }
        .horizontal-grid { display: flex; gap: 2vw; overflow-x: auto; height: 33%; align-items: center; }
        .horizontal-grid::-webkit-scrollbar { display: none; }
        .card { flex: 0 0 21%; height: 95%; background: #1a1f1c; border-radius: 14px; border: 2px solid transparent; display: flex; flex-direction: column; justify-content: center; padding: 20px; cursor: pointer; box-shadow: 0 8px 24px rgba(0,0,0,0.4); transition: transform 0.2s; }
        .card:focus { border-color: #00ff66; transform: scale(1.05); background: #223c2b; outline: none; }
        .card-title { font-size: 1.15rem; font-weight: 700; }
    </style>
</head>
<body>

    <header>
        <div class="logo">🎛️ SMART REM TV</div>
        <div class="time" id="clock">00:00</div>
    </header>

    <div class="row-title">قنوات البث المباشر والاختبار</div>
    <div class="horizontal-grid">
        <div class="card" tabindex="1" data-id="NpEaa2P7qZI">
            <div class="card-title">قناة الطبيعة العالمية</div>
        </div>
        <div class="card" tabindex="2" data-id="Ir3Vb_709pM">
            <div class="card-title">إعلان سينمائي تجريبي</div>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = 
                now.getHours().toString().padStart(2, '0') + ':' + 
                now.getMinutes().toString().padStart(2, '0');
        }
        setInterval(updateClock, 1000);
        updateClock();

        document.querySelector('.card').focus();

        // دالة الانتقال الكامل لصفحة المشغل لتفريغ ذاكرة التلفزيون
        function goToPlayer(videoId) {
            window.location.href = `player.html?id=${videoId}`;
        }

        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('click', function() {
                const videoId = this.getAttribute('data-id');
                if(videoId) goToPlayer(videoId);
            });

            card.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.keyCode === 13) {
                    const videoId = this.getAttribute('data-id');
                    if(videoId) goToPlayer(videoId);
                }
            });
        });
    </script>
</body>
</html>
